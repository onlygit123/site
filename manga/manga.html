<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Манга — популярное · AnimeBase</title>
    <link rel="stylesheet" href="manga.css" />
  </head>
  <body>
    <div class="navbar">
      <div class="nav-container container">
        <div class="nav-links">
          <a href="../anime/anime.html">Аниме</a>
          <a href="manga.html" class="active">Манга</a>
          <a href="../ranobe/ranobe.html">Ранобэ</a>
          <a href="../community/community.html">Сообщество</a>
          <a href="../svyaz/svyaz.html">Форма связи</a>
        </div>
        <div class="header-right">
          <div class="search-wrapper">
            <input
              type="text"
              id="searchInput"
              class="search-input"
              placeholder="Поиск манги..."
              autocomplete="off"
            />
            <button id="searchButton" class="search-btn">Найти</button>
            <button id="clearSearchBtn" class="clear-search">Сбросить</button>
          </div>

          <div class="theme-toggle-wrapper">
            <input
              type="checkbox"
              id="themeSwitch"
              class="theme-toggle-input"
            />
            <label for="themeSwitch" class="theme-toggle-label">
              <span class="theme-toggle-circle"></span>

              <span class="theme-toggle-icon moon-icon">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
              </span>

              <span class="theme-toggle-icon sun-icon">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="12" cy="12" r="5" />
                  <line x1="12" y1="1" x2="12" y2="3" />
                  <line x1="12" y1="21" x2="12" y2="23" />
                  <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                  <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                  <line x1="1" y1="12" x2="3" y2="12" />
                  <line x1="21" y1="12" x2="23" y2="12" />
                  <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                  <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                </svg>
              </span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <main class="container">
      <div class="page-header">
        <h1>Манга <span>• Популярное</span></h1>
        <div class="sort-panel">
          <span class="sort-label">Сортировать по:</span>
          <button class="sort-btn active" data-sort="popularity">
            Популярности
          </button>
          <button class="sort-btn" data-sort="score">Рейтингу</button>
          <button class="sort-btn" data-sort="title">Названию</button>
          <button class="sort-btn" data-sort="year">Году</button>
        </div>
      </div>

      <div id="manga-grid-container" class="manga-grid">
        <div class="loading-placeholder">Загрузка тайтлов...</div>
      </div>

      <div class="pagination" id="pagination-controls"></div>
    </main>

    <footer>
      <div class="logo-and-text">
        <div class="footer-logo">
          <img
            src="../images-font/logo.jpg"
            alt="AnimeBase Logo"
            onerror="
              this.src = '';
              this.nextElementSibling.style.display = 'inline';
            "
          />
          <span style="display: none">🍥 AnimeBase</span>
          <span>AnimeBase</span>
        </div>
        <p class="footer-copyright">
          Фан-проект, вдохновлённый Shikimori. Постеры предоставлены
          пользователем.
        </p>
      </div>
      <div class="contacts">
        <p class="p-contacts">Контакты:</p>
        <a href="https://t.me/Foxyvov95" target="_blank" class="telegram-link">
          <img
            src="../images-font/telegram.png"
            alt="telegram"
            class="telegram"
          />
        </a>
        <a
          href="https://github.com/onlygit123"
          target="_blank"
          class="github-link"
        >
          <img src="../images-font/github.png" alt="github" class="github" />
        </a>
        <a
          href="mailto:ychebnayamaximmaslov@gmail.com"
          target="_blank"
          class="contact-links"
          >ychebnaymaximmaslov@gmail.com</a
        >
        <a
          href="tel:+48725979929"
          target="_blank"
          class="telephone contact-links"
          >+48 725 979 929</a
        >
      </div>
    </footer>

    <div id="detailModal" class="modal-overlay">
      <div class="modal-container">
        <button class="modal-close" id="detailModalClose">&times;</button>
        <div class="modal-content" id="detailModalContent"></div>
      </div>
    </div>

    <script src="manga.js"></script>
  </body>
</html>
